<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Shrimpin'?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Title -->
    <div class="title">
        <span class="title-normal">ARE YOU </span>
        <span class="title-shrimp">SHRIMPIN' ?</span>
    </div>

    <!-- Stats Row -->
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Time:</span>
            <span id="time">00:00:00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Shrimp counter:</span>
            <span id="shrimp-counter">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Session:</span>
            <span id="session">00:00:00</span>
        </div>
    </div>

    <!-- Buttons Row -->
    <div class="buttons">
        <button id="start-btn">START</button>
        <button id="reset-btn">RESET</button>
        <button id="stop-btn">STOP</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Webcam Box -->
        <div class="webcam-box"></div>

        <!-- Shrimp Image -->
        <div class="shrimp-container">
            <img id="shrimp" src="shrimp1.png" alt="Shrimp">
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">TAKE CARE OF YOURSELF <3</div>
    <script>
        // Get elements
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');
const resetBtn = document.getElementById('reset-btn');
const timeEl = document.getElementById('time');
const shrimpCounterEl = document.getElementById('shrimp-counter');
const sessionEl = document.getElementById('session');
const shrimpImg = document.getElementById('shrimp');

// State variables
let totalSeconds = 0;
let sessionCount = 0;  // Changed: session is now a counter
let shrimpCount = 0;
let timerInterval = null;
let animationInterval = null;
let currentFrame = 1;

// Format time as HH:MM:SS
function formatTime(seconds) {
    const hrs = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

// Start shrimp animation
function startAnimation() {
    currentFrame = 1;
    shrimpImg.src = 'shrimp1.png';
    
    animationInterval = setInterval(() => {
        currentFrame = currentFrame === 1 ? 2 : 1;
        shrimpImg.src = `shrimp${currentFrame}.png`;
    }, 500);
}

// Stop shrimp animation
function stopAnimation() {
    if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
    }
    shrimpImg.src = 'shrimp1.png';
}

// START button
startBtn.addEventListener('click', () => {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    
    // Increment session counter
    sessionCount++;
    sessionEl.textContent = sessionCount;
    
    // Start time timer
    timerInterval = setInterval(() => {
        totalSeconds++;
        timeEl.textContent = formatTime(totalSeconds);
    }, 1000);
    
    // Start shrimp animation
    startAnimation();
});

// STOP button
stopBtn.addEventListener('click', () => {
    startBtn.disabled = false;
    stopBtn.disabled = true;
    
    // Stop timer
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    // Stop animation
    stopAnimation();
});

// RESET button (only resets time)
resetBtn.addEventListener('click', () => {
    // Stop if running
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    stopAnimation();
    
    // Reset time only
    totalSeconds = 0;
    timeEl.textContent = '00:00:00';
    
    // Re-enable buttons
    startBtn.disabled = false;
    stopBtn.disabled = true;
});

// Initialize stop button as disabled
stopBtn.disabled = true;
    </script>
</body>
</html>
</body>
</html>
