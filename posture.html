<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Shrimpin'?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Title -->
    <div class="title">
        <span class="title-normal">ARE YOU </span>
        <span class="title-shrimp">SHRIMPIN' ?</span>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-item">Time: <span id="total-time">00:00:00</span></div>
        <div class="stat-item">Shrimp counter: <span id="shrimp-count">0</span></div>
        <div class="stat-item">Session counter: <span id="session-count">0</span></div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="reset-btn">RESET</button>
    </div>

    <!-- Main Content -->
    <div class="content">
        <!-- Webcam Box -->
        <div class="webcam-box">
            <p>Webcam will appear here</p>
        </div>

        <!-- Shrimp Animation -->
        <div class="shrimp-container">
            <img id="shrimp" src="shrimp1.png" alt="Coding Shrimp">
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">TAKE CARE OF YOURSELF!!</div>

    <script>
        // Elements
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const resetBtn = document.getElementById('reset-btn');
        const totalTimeEl = document.getElementById('total-time');
        const sessionCountEl = document.getElementById('session-count');
        const shrimpCountEl = document.getElementById('shrimp-count');
        const shrimpImg = document.getElementById('shrimp');

        // State
        let sessionActive = false;
        let totalSeconds = 0;
        let sessionCount = 0;
        let shrimpCount = 0;
        let timerInterval = null;
        let animationInterval = null;
        let currentFrame = 1;

        // Format time as HH:MM:SS
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // Start shrimp typing animation
        function startShrimpAnimation() {
            currentFrame = 1;
            shrimpImg.src = 'shrimp1.png';
            
            animationInterval = setInterval(() => {
                currentFrame = currentFrame === 1 ? 2 : 1;
                shrimpImg.src = `shrimp${currentFrame}.png`;
            }, 500);
        }

        // Stop shrimp animation
        function stopShrimpAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
            shrimpImg.src = 'shrimp1.png'; // Reset to frame 1
        }

        // Start session
        startBtn.addEventListener('click', () => {
            sessionActive = true;
            sessionCount++;
            sessionCountEl.textContent = sessionCount;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            
            // Start timer
            timerInterval = setInterval(() => {
                totalSeconds++;
                totalTimeEl.textContent = formatTime(totalSeconds);
            }, 1000);
            
            // Start shrimp animation
            startShrimpAnimation();
        });

        // Stop session
        stopBtn.addEventListener('click', () => {
            sessionActive = false;
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            // Stop timer
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // Stop shrimp animation
            stopShrimpAnimation();
        });

        // Reset everything
// Reset only time
resetBtn.addEventListener('click', () => {
    // Stop session if active
    if (sessionActive) {
        sessionActive = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        stopShrimpAnimation();
    }
    
    // Reset ONLY time counter
    totalSeconds = 0;
    
    // Update display
    totalTimeEl.textContent = '00:00:00';
});
    </script>
</body>
</html>
